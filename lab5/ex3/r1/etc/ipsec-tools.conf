flush;
spdflush;

# SAD for R1 -> R2
add 100.60.0.100 100.90.0.100 esp 0x200 -E aes-cbc 0x11223344556677889900aabbccddeeff;
add 100.60.0.100 100.90.0.100 ah 0x201 -A hmac-md5 0xffeeddccbbaa00998877665544332211;

# SA for R2 -> R1
add 100.90.0.100 100.60.0.100 esp 0x300 -E aes-cbc 0x11223344556677889900aabbccddeeff;
add 100.90.0.100 100.60.0.100 ah 0x301 -A hmac-md5 0xffeeddccbbaa00998877665544332211;

# SPD Policy OUT
spdadd 100.60.0.100 100.90.0.100 any -P out ipsec esp/transport//require ah/transport//require;
# SPD Policy IN
spdadd 100.90.0.100 100.60.0.100 any -P in ipsec esp/transport//require ah/transport//require;