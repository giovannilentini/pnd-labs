#SPD outgoing from lanB tro lanA
spdadd 192.168.2.0/24 192.168.1.0/24 any -P out ipsec esp/tunnel/100.90.0.2-100.60.0.2/require;
# SPD incoming from lanA to lanB
spdadd 192.168.1.0/24 192.168.2.0/24 any -P in ipsec esp/tunnel/100.60.0.2-100.90.0.2/require;

# SA from r1 to r2
add 100.60.0.2 100.90.0.2 esp 0x1001 -m tunnel -E 3des-cbc 0x0123456789abcdef0123456789abcdef0123456789abcdef;
# SA from r2 to r1
add 100.90.0.2 100.60.0.2 esp 0x1002 -m tunnel -E 3des-cbc 0xfedcba9876543210fedcba9876543210fedcba9876543210;